<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlyFF MMO RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      z-index: 1000; transition: opacity 0.5s;
    }
    #loading h1 {
      font-size: 3rem; letter-spacing: 0.3rem;
      background: linear-gradient(45deg, #e74c3c, #f39c12);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 1rem; font-family: 'Segoe UI', sans-serif;
    }
    #loading p { color: #888; font-size: 1.1rem; margin-bottom: 1.5rem; font-family: sans-serif; }
    .loader {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #e74c3c; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>FLYFF</h1>
    <p>Loading Fly For Fun world...</p>
    <div class="loader"></div>
  </div>

  <script type="module">
    import { GameClient } from '/src/main.ts';

    const loadingEl = document.getElementById('loading');
    const canvas = document.createElement('canvas');
    document.body.appendChild(canvas);

    const game = new GameClient();

    game.initialize(canvas).then(() => {
      loadingEl.classList.add('hidden');
      setTimeout(() => loadingEl.style.display = 'none', 500);

      const token = localStorage.getItem('flyff_auth_token') || 'dev-token';
      game.connectToServer(token);

      let lastTime = performance.now();
      function loop(time) {
        const dt = Math.min((time - lastTime) / 1000, 0.05);
        lastTime = time;
        game.update(dt);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
