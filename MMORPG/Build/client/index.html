<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FlyFF MMO RPG</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="loading">
    <h1>FLYFF</h1>
    <p>Loading world...</p>
    <div class="loader"></div>
  </div>

  <div id="lobby-ui" style="display: none;"></div>

  <div id="hud-overlay" style="display: none;">
    <div id="hud-top-left">
      <div id="player-name-display"></div>
      <div id="level-display">Lv.1</div>
      <div class="bar-container" id="hp-bar-container">
        <div class="bar-label">HP</div>
        <div class="bar-track"><div class="bar-fill hp-fill" id="hp-fill"></div></div>
        <div class="bar-value" id="hp-value">100/100</div>
      </div>
      <div class="bar-container" id="mp-bar-container">
        <div class="bar-label">MP</div>
        <div class="bar-track"><div class="bar-fill mp-fill" id="mp-fill"></div></div>
        <div class="bar-value" id="mp-value">50/50</div>
      </div>
      <div class="bar-container" id="xp-bar-container">
        <div class="bar-label">XP</div>
        <div class="bar-track"><div class="bar-fill xp-fill" id="xp-fill"></div></div>
        <div class="bar-value" id="xp-value">0/100</div>
      </div>
    </div>

    <div id="hud-top-right">
      <div class="difficulty-combo">
        <label for="difficulty-select">Monster Difficulty</label>
        <select id="difficulty-select">
          <option value="easy" selected>Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
          <option value="hardest">Hardest</option>
        </select>
      </div>
      <div id="score-display">
        <div id="score-kills">Kills: 0</div>
        <div id="score-deaths">Deaths: 0</div>
      </div>
    </div>

    <div id="hud-bottom-center">
      <div id="help-text">WASD: Move | Left-click: Attack | Right-click: Rotate camera | F: Pick up weapon | I: Inventory</div>
      <div id="weapon-pickup-hint" style="display:none;"></div>
    </div>

    <div id="hud-center">
      <div id="combat-feedback"></div>
    </div>

  <div id="hud-damage-container"></div>
</div>

<div id="inventory-overlay" style="display:none;">
  <div id="inventory-content">
    <div id="inventory-header">
      <h2>Inventory</h2>
      <button id="inventory-close">&times;</button>
    </div>
    <div id="inventory-list"></div>
  </div>
</div>

<div id="nameplates"></div>

<div id="npc-dialog" style="display: none;">
  <div id="npc-dialog-content">
    <div id="npc-dialog-name"></div>
    <div id="npc-dialog-text"></div>
    <button id="npc-dialog-close">Close</button>
  </div>
</div>

  <div id="leaderboard" style="display: none;">
    <div id="leaderboard-header">
      <h2>Leaderboard</h2>
      <button id="leaderboard-close">X</button>
    </div>
    <div id="leaderboard-list"></div>
  </div>

  <script type="module">
    import { GameClient } from '/src/main.ts';

    const loadingEl = document.getElementById('loading');
    const canvas = document.createElement('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.prepend(canvas);

    const game = new GameClient();

    game.initialize(canvas).then(() => {
      loadingEl.classList.add('hidden');
      setTimeout(() => loadingEl.style.display = 'none', 500);

      const token = localStorage.getItem('flyff_auth_token') || 'dev-token';
      game.connectToServer(token);
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
