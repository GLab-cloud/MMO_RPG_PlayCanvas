<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlyFF MMO RPG</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="loading">
    <h1>FLYFF</h1>
    <p>Loading Fly For Fun world...</p>
    <div class="loader"></div>
  </div>

  <div id="lobby-ui" style="display: none;"></div>

  <script type="module">
    import { GameClient } from '/src/main.ts';

    const loadingEl = document.getElementById('loading');
    const canvas = document.createElement('canvas');
    document.body.appendChild(canvas);

    const game = new GameClient();

    game.initialize(canvas).then(() => {
      loadingEl.classList.add('hidden');
      setTimeout(() => loadingEl.style.display = 'none', 500);

      const token = localStorage.getItem('flyff_auth_token') || 'dev-token';
      game.connectToServer(token);

      let lastTime = performance.now();
      function loop(time) {
        const dt = Math.min((time - lastTime) / 1000, 0.05);
        lastTime = time;
        game.update(dt);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
