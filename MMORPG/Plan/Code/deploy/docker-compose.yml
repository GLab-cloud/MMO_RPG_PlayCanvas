version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flyff_mvp
      POSTGRES_USER: flyff
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyff"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  auth-server:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile.server
    environment:
      - SERVER_PORT=2567
      - DATABASE_URL=postgresql://flyff:${DB_PASSWORD:-changeme}@postgres:5432/flyff_mvp
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - LOG_LEVEL=info
      - ENABLE_MONITOR=true
    ports:
      - "2567:2567"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  game-server:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile.server
    environment:
      - SERVER_PORT=2568
      - DATABASE_URL=postgresql://flyff:${DB_PASSWORD:-changeme}@postgres:5432/flyff_mvp
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
    ports:
      - "2568:2568"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - auth-server
      - game-server
    restart: unless-stopped

volumes:
  pgdata:
